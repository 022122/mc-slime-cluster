
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Slime Cluster Finder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .app { display: flex; height: 100vh; }
        .sidebar {
            width: 320px;
            min-width: 320px;
            background: #16213e;
            border-right: 1px solid #1a1a4e;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        h1 { color: #7ec850; font-size: 1.3em; text-align: center; }
        h1 span { color: #5a5; }
        .subtitle { text-align: center; color: #666; font-size: 0.75em; }
        .section {
            background: #0f3460;
            border-radius: 8px;
            padding: 12px;
        }
        .section h3 { color: #7ec850; font-size: 0.85em; margin-bottom: 8px; }
        .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        label { font-size: 0.75em; color: #888; margin-bottom: 2px; }
        input {
            background: #1a1a2e;
            border: 1px solid #1a1a4e;
            border-radius: 4px;
            padding: 6px 8px;
            color: #e0e0e0;
            font-size: 0.9em;
            outline: none;
            width: 100%;
        }
        input:focus { border-color: #7ec850; }
        button {
            background: #7ec850;
            color: #1a1a2e;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #6ab840; }
        button:disabled { background: #444; cursor: not-allowed; }
        .results-list { flex: 1; overflow-y: auto; }
        .result-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.82em;
            font-family: 'Consolas', monospace;
        }
        .result-item:hover { background: #1a2a4e; }
        .result-item.active { background: #1a3a5e; border: 1px solid #7ec850; }
        .result-rank { color: #666; min-width: 20px; }
        .result-coords { flex: 1; }
        .result-score { color: #7ec850; font-weight: bold; }
        .result-bar {
            width: 50px; height: 6px;
            background: #1a1a2e; border-radius: 3px; overflow: hidden;
        }
        .result-bar-fill { height: 100%; border-radius: 3px; }
        .map-container {
            flex: 1; position: relative; overflow: hidden; cursor: grab;
        }
        .map-container:active { cursor: grabbing; }
        canvas { position: absolute; top: 0; left: 0; }
        .map-info {
            position: absolute; bottom: 8px; left: 8px;
            background: rgba(22,33,62,0.9); padding: 4px 8px;
            border-radius: 4px; font-size: 0.75em; color: #888;
            pointer-events: none;
        }
        .map-legend {
            position: absolute; top: 8px; right: 8px;
            background: rgba(22,33,62,0.9); padding: 8px;
            border-radius: 4px; font-size: 0.75em;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; }
        .status-bar {
            background: #16213e; border-top: 1px solid #1a1a4e;
            padding: 4px 12px; font-size: 0.75em; color: #666;
            display: flex; justify-content: space-between;
        }
        .zoom-controls {
            position: absolute; top: 8px; left: 8px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .zoom-btn {
            width: 32px; height: 32px;
            background: rgba(22,33,62,0.9); border: 1px solid #1a1a4e;
            color: #e0e0e0; border-radius: 4px; cursor: pointer;
            font-size: 1.2em; display: flex; align-items: center;
            justify-content: center; padding: 0;
        }
        .zoom-btn:hover { background: #1a3a5e; }
        .hint { color: #666; font-size: 0.75em; text-align: center; padding: 4px; }
        .progress-container {
            margin-top: 8px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a1a2e;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #7ec850;
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }
        .progress-text {
            font-size: 0.75em;
            color: #888;
            text-align: center;
            margin-top: 4px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .searching .progress-fill {
            animation: pulse 1.5s ease-in-out infinite;
            width: 100% !important;
            background: linear-gradient(90deg, #7ec850, #c8c850, #7ec850);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div>
                <h1>рЯЯҐ MC <span>Slime</span> Finder</h1>
                <p class="subtitle">Java Edition еЕ®зЙИжЬђ ¬Ј WASM й©±еК®</p>
            </div>

            <div class="section">
                <h3>рЯФН жРЬзіҐиЃЊзљЃ</h3>
                <div class="form-group" style="margin-bottom:8px">
                    <label>зІНе≠Р</label>
                    <input type="text" id="seed" value="0" placeholder="зІНе≠Р">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>дЄ≠ењГ XпЉИеМЇеЭЧпЉЙ</label>
                        <input type="number" id="ox" value="0">
                    </div>
                    <div class="form-group">
                        <label>дЄ≠ењГ ZпЉИеМЇеЭЧпЉЙ</label>
                        <input type="number" id="oz" value="0">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:8px">
                    <label>жРЬзіҐеНКеЊДпЉИеМЇеЭЧпЉМеПѓдї•еЊИе§ІпЉЙ</label>
                    <input type="number" id="radius" value="500" min="10" max="100000">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>зїУжЮДеЃљеЇ¶</label>
                        <input type="number" id="width" value="3" min="1" max="20">
                    </div>
                    <div class="form-group">
                        <label>зїУжЮДйЂШеЇ¶</label>
                        <input type="number" id="height" value="3" min="1" max="20">
                    </div>
                    <div class="form-group">
                        <label>ињФеЫЮжХ∞йЗП</label>
                        <input type="number" id="top" value="10" min="1" max="50">
                    </div>
                </div>
                <button id="searchBtn" onclick="doSearch()" disabled>еК†иљљдЄ≠...</button>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">еЗЖе§ЗдЄ≠...</div>
                </div>
                <p class="hint">жРЬзіҐеНКеЊДеПѓиЃЊеЊИе§ІпЉИе¶В 10000пЉЙпЉМеЬ∞еЫЊеП™жШЊз§ЇзїУжЮЬйЩДињСеМЇеЯЯ</p>
            </div>

            <div class="section results-list" id="resultsPanel" style="display:none">
                <h3>рЯУК жРЬзіҐзїУжЮЬ <span id="resultsCount" style="color:#888;font-weight:normal"></span></h3>
                <div id="resultsList"></div>
            </div>
        </div>

        <div class="main">
            <div class="map-container" id="mapContainer">
                <canvas id="mapCanvas"></canvas>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomIn()">+</button>
                    <button class="zoom-btn" onclick="zoomOut()">вИТ</button>
                    <button class="zoom-btn" onclick="resetView()">вМВ</button>
                </div>
                <div class="map-legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background:#7ec850"></div>
                        <span>еП≤иО±еІЖеМЇеЭЧ</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background:#2a2a3e"></div>
                        <span>жЩЃйАЪеМЇеЭЧ</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background:rgba(255,200,0,0.4);border:1px solid #fc0"></div>
                        <span>жРЬзіҐзїУжЮЬ</span>
                    </div>
                </div>
                <div class="map-info" id="mapInfo">жРЬзіҐеРОзВєеЗїзїУжЮЬжЯ•зЬЛеЬ∞еЫЊ</div>
            </div>
            <div class="status-bar">
                <span id="statusText">е∞±зї™</span>
                <span id="statusTime"></span>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { get_slime_bitmap } from './pkg/slime_search.js';

        let wasmReady = false;
        let workerReady = false;
        let searchTimer = null;
        let searchStartTime = 0;

        // жРЬзіҐ Worker
        const worker = new Worker('./worker.js', { type: 'module' });
        worker.postMessage({ type: 'init' });

        worker.onmessage = function(e) {
            const msg = e.data;
            if (msg.type === 'ready') {
                workerReady = true;
                updateButtonState();
            } else if (msg.type === 'progress') {
                showProgress(msg.progress, msg.status);
            } else if (msg.type === 'result') {
                onSearchComplete(msg.results, msg.elapsed);
            } else if (msg.type === 'error') {
                onSearchError(msg.error);
            }
        };

        // еЬ∞еЫЊжШЊз§ЇзЪДеЫЇеЃЪиІЖеП£е§Іе∞ПпЉИеМЇеЭЧжХ∞пЉЙпЉМеП™жЄ≤жЯУињЩдєИе§ІзЪДеМЇеЯЯ
        const VIEW_RADIUS = 40;

        let mapState = {
            bitmap: null,
            cx_min: 0, cz_min: 0,
            mapW: 0, mapH: 0,
            cellSize: 8,
            offsetX: 0, offsetY: 0,
            dragging: false,
            dragStartX: 0, dragStartY: 0,
            dragOffsetX: 0, dragOffsetY: 0,
            results: [],
            activeResult: -1,
            patternW: 3, patternH: 3,
            seedHi: 0, seedLo: 0,
            centerCx: 0, centerCz: 0,
        };

        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('mapContainer');

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawMap();
        }

        function parseSeed() {
            const s = document.getElementById('seed').value.trim();
            try {
                const big = BigInt(s);
                const signed = BigInt.asIntN(64, big);
                const hi = Number(BigInt.asIntN(32, signed >> 32n));
                const lo = Number(BigInt.asUintN(32, signed));
                return { hi, lo, str: signed.toString() };
            } catch {
                return null;
            }
        }

        // еК†иљљжМЗеЃЪдЄ≠ењГзВєйЩДињСзЪДеЬ∞еЫЊ
        function loadMapAround(centerCx, centerCz) {
            const viewSize = VIEW_RADIUS * 2 + 1;
            const cx_min = centerCx - VIEW_RADIUS;
            const cz_min = centerCz - VIEW_RADIUS;

            const bitmap = get_slime_bitmap(mapState.seedHi, mapState.seedLo, cx_min, cz_min, viewSize, viewSize);

            mapState.bitmap = bitmap;
            mapState.cx_min = cx_min;
            mapState.cz_min = cz_min;
            mapState.mapW = viewSize;
            mapState.mapH = viewSize;
            mapState.centerCx = centerCx;
            mapState.centerCz = centerCz;

            // иЗ™еК®иЃ°зЃЧ cellSize
            const maxCellW = canvas.width / viewSize;
            const maxCellH = canvas.height / viewSize;
            mapState.cellSize = Math.max(2, Math.min(16, Math.floor(Math.min(maxCellW, maxCellH))));

            // е±ЕдЄ≠
            mapState.offsetX = (canvas.width - viewSize * mapState.cellSize) / 2;
            mapState.offsetY = (canvas.height - viewSize * mapState.cellSize) / 2;

            drawMap();
        }

        function updateButtonState() {
            const btn = document.getElementById('searchBtn');
            if (wasmReady && workerReady) {
                btn.disabled = false;
                btn.textContent = 'рЯФН жРЬзіҐ';
            }
        }

        function showProgress(pct, text) {
            const container = document.getElementById('progressContainer');
            const fill = document.getElementById('progressFill');
            const textEl = document.getElementById('progressText');
            container.style.display = 'block';
            if (pct < 0) {
                container.classList.add('searching');
            } else {
                container.classList.remove('searching');
                fill.style.width = pct + '%';
            }
            textEl.textContent = text || '';
        }

        function hideProgress() {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('progressContainer').classList.remove('searching');
            if (searchTimer) { clearInterval(searchTimer); searchTimer = null; }
        }

        window.doSearch = function() {
            const seed = parseSeed();
            if (!seed) { alert('зІНе≠Рж†ЉеЉПжЧ†жХИ'); return; }

            mapState.seedHi = seed.hi;
            mapState.seedLo = seed.lo;

            const ox = parseInt(document.getElementById('ox').value) || 0;
            const oz = parseInt(document.getElementById('oz').value) || 0;
            const radius = parseInt(document.getElementById('radius').value) || 500;
            const pw = parseInt(document.getElementById('width').value) || 3;
            const ph = parseInt(document.getElementById('height').value) || 3;
            const topN = parseInt(document.getElementById('top').value) || 10;

            mapState.patternW = pw;
            mapState.patternH = ph;
            mapState._searchOx = ox;
            mapState._searchOz = oz;

            const params = {
                seed: seed.str,
                origin_x: ox,
                origin_z: oz,
                search_radius: radius,
                pattern_w: pw,
                pattern_h: ph,
                top_n: topN,
            };

            document.getElementById('searchBtn').disabled = true;
            document.getElementById('searchBtn').textContent = 'вП≥ жРЬзіҐдЄ≠...';

            const totalChunks = (radius * 2 + 1) ** 2;
            showProgress(-1, `ж≠£еЬ®жРЬзіҐ ${totalChunks.toLocaleString()} дЄ™еМЇеЭЧ...`);

            // иЃ°жЧґеЩ®жЫіжЦ∞зїПињЗжЧґйЧі
            searchStartTime = performance.now();
            searchTimer = setInterval(() => {
                const elapsed = ((performance.now() - searchStartTime) / 1000).toFixed(1);
                document.getElementById('progressText').textContent =
                    `ж≠£еЬ®жРЬзіҐ ${totalChunks.toLocaleString()} дЄ™еМЇеЭЧ... ${elapsed}s`;
            }, 200);

            worker.postMessage({ type: 'search', params });
        };

        function onSearchComplete(results, elapsed) {
            hideProgress();
            const pw = mapState.patternW;
            const ph = mapState.patternH;
            const ox = mapState._searchOx || 0;
            const oz = mapState._searchOz || 0;

            mapState.results = results || [];
            showResults(mapState.results, pw * ph, elapsed);

            if (mapState.results.length > 0) {
                mapState.activeResult = 0;
                const r = mapState.results[0];
                loadMapAround(r.chunk_x + Math.floor(pw / 2), r.chunk_z + Math.floor(ph / 2));
            } else {
                loadMapAround(ox, oz);
            }

            const radius = parseInt(document.getElementById('radius').value) || 500;
            document.getElementById('statusText').textContent =
                `жРЬзіҐ ${(radius*2+1)}√Ч${(radius*2+1)} еМЇеЭЧпЉМжЙЊеИ∞ ${mapState.results.length} дЄ™зїУжЮЬ`;
            document.getElementById('statusTime').textContent = `${elapsed.toFixed(1)}ms`;

            document.getElementById('searchBtn').disabled = false;
            document.getElementById('searchBtn').textContent = 'рЯФН жРЬзіҐ';
        }

        function onSearchError(error) {
            hideProgress();
            alert('жРЬзіҐеЗЇйФЩ: ' + error);
            document.getElementById('searchBtn').disabled = false;
            document.getElementById('searchBtn').textContent = 'рЯФН жРЬзіҐ';
        }

        function showResults(results, total, elapsed) {
            const panel = document.getElementById('resultsPanel');
            const list = document.getElementById('resultsList');
            panel.style.display = 'block';
            document.getElementById('resultsCount').textContent = `(${results.length} дЄ™)`;

            if (!results.length) {
                list.innerHTML = '<div style="color:#666;padding:8px;text-align:center">жЬ™жЙЊеИ∞зїУжЮЬ</div>';
                return;
            }

            list.innerHTML = results.map((r, i) => {
                const pct = (r.matched / total * 100).toFixed(0);
                const color = r.matched === total ? '#7ec850' : (pct >= 70 ? '#c8c850' : '#e85050');
                const star = r.matched === total ? ' вШЕ' : '';
                return `<div class="result-item ${i === 0 ? 'active' : ''}" onclick="selectResult(${i})">
                    <span class="result-rank">#${i+1}</span>
                    <span class="result-coords">(${r.chunk_x}, ${r.chunk_z})</span>
                    <span class="result-score">${r.matched}/${total}${star}</span>
                    <div class="result-bar"><div class="result-bar-fill" style="width:${pct}%;background:${color}"></div></div>
                </div>`;
            }).join('');
        }

        window.selectResult = function(idx) {
            mapState.activeResult = idx;
            document.querySelectorAll('.result-item').forEach((el, i) => {
                el.classList.toggle('active', i === idx);
            });

            const r = mapState.results[idx];
            if (r) {
                const cx = r.chunk_x + Math.floor(mapState.patternW / 2);
                const cz = r.chunk_z + Math.floor(mapState.patternH / 2);
                loadMapAround(cx, cz);
            }
        };

        function drawMap() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!mapState.bitmap) {
                ctx.fillStyle = '#444';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('зВєеЗїгАМжРЬзіҐгАНеЉАеІЛ', canvas.width / 2, canvas.height / 2);
                return;
            }

            const { bitmap, cx_min, cz_min, mapW, mapH, cellSize, offsetX, offsetY } = mapState;

            // еПѓиІБиМГеЫі
            const startX = Math.max(0, Math.floor(-offsetX / cellSize));
            const startZ = Math.max(0, Math.floor(-offsetY / cellSize));
            const endX = Math.min(mapW, Math.ceil((canvas.width - offsetX) / cellSize));
            const endZ = Math.min(mapH, Math.ceil((canvas.height - offsetY) / cellSize));

            // зїШеИґеМЇеЭЧ
            for (let iz = startZ; iz < endZ; iz++) {
                for (let ix = startX; ix < endX; ix++) {
                    const isSlime = bitmap[iz * mapW + ix];
                    const px = offsetX + ix * cellSize;
                    const pz = offsetY + iz * cellSize;
                    ctx.fillStyle = isSlime ? '#7ec850' : '#2a2a3e';
                    ctx.fillRect(px, pz, cellSize - 0.5, cellSize - 0.5);
                }
            }

            // зљСж†ЉзЇњпЉИcellSize >= 8пЉЙ
            if (cellSize >= 8) {
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 0.5;
                for (let ix = startX; ix <= endX; ix++) {
                    const px = offsetX + ix * cellSize;
                    ctx.beginPath();
                    ctx.moveTo(px, offsetY + startZ * cellSize);
                    ctx.lineTo(px, offsetY + endZ * cellSize);
                    ctx.stroke();
                }
                for (let iz = startZ; iz <= endZ; iz++) {
                    const pz = offsetY + iz * cellSize;
                    ctx.beginPath();
                    ctx.moveTo(offsetX + startX * cellSize, pz);
                    ctx.lineTo(offsetX + endX * cellSize, pz);
                    ctx.stroke();
                }
            }

            // зїШеИґжРЬзіҐзїУжЮЬйЂШдЇЃ
            const pw = mapState.patternW;
            const ph = mapState.patternH;

            mapState.results.forEach((r, i) => {
                const rx = r.chunk_x - cx_min;
                const rz = r.chunk_z - cz_min;
                // еП™зїШеИґеЬ®ељУеЙНиІЖеП£еЖЕзЪДзїУжЮЬ
                if (rx + pw < 0 || rx >= mapW || rz + ph < 0 || rz >= mapH) return;

                const px = offsetX + rx * cellSize;
                const pz = offsetY + rz * cellSize;

                if (i === mapState.activeResult) {
                    ctx.fillStyle = 'rgba(255, 200, 0, 0.15)';
                    ctx.fillRect(px, pz, pw * cellSize, ph * cellSize);
                    ctx.strokeStyle = '#ffcc00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(px, pz, pw * cellSize, ph * cellSize);
                    if (cellSize >= 4) {
                        ctx.fillStyle = '#ffcc00';
                        ctx.font = `bold ${Math.max(10, cellSize)}px sans-serif`;
                        ctx.textAlign = 'left';
                        ctx.fillText(`#${i + 1} (${r.matched}/${r.total})`, px + 2, pz - 4);
                    }
                } else {
                    ctx.strokeStyle = 'rgba(255, 200, 0, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(px, pz, pw * cellSize, ph * cellSize);
                }
            });

            // еЭРж†Зж†Зж≥®пЉИcellSize >= 10пЉЙ
            if (cellSize >= 10) {
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.font = `${Math.max(8, cellSize * 0.6)}px monospace`;
                ctx.textAlign = 'center';
                for (let ix = startX; ix < endX; ix += Math.max(1, Math.floor(40 / cellSize))) {
                    const cx = cx_min + ix;
                    const px = offsetX + ix * cellSize + cellSize / 2;
                    ctx.fillText(cx.toString(), px, offsetY + startZ * cellSize - 2);
                }
                ctx.textAlign = 'right';
                for (let iz = startZ; iz < endZ; iz += Math.max(1, Math.floor(40 / cellSize))) {
                    const cz = cz_min + iz;
                    const pz = offsetY + iz * cellSize + cellSize / 2;
                    ctx.fillText(cz.toString(), offsetX + startX * cellSize - 4, pz + 3);
                }
            }
        }

        // йЉ†ж†ЗжЛЦжЛљ
        container.addEventListener('mousedown', (e) => {
            mapState.dragging = true;
            mapState.dragStartX = e.clientX;
            mapState.dragStartY = e.clientY;
            mapState.dragOffsetX = mapState.offsetX;
            mapState.dragOffsetY = mapState.offsetY;
        });

        window.addEventListener('mousemove', (e) => {
            if (mapState.dragging) {
                mapState.offsetX = mapState.dragOffsetX + (e.clientX - mapState.dragStartX);
                mapState.offsetY = mapState.dragOffsetY + (e.clientY - mapState.dragStartY);
                drawMap();
            }
            if (mapState.bitmap) {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const ix = Math.floor((mx - mapState.offsetX) / mapState.cellSize);
                const iz = Math.floor((my - mapState.offsetY) / mapState.cellSize);
                const cx = mapState.cx_min + ix;
                const cz = mapState.cz_min + iz;
                const inBounds = ix >= 0 && ix < mapState.mapW && iz >= 0 && iz < mapState.mapH;
                const isSlime = inBounds ? mapState.bitmap[iz * mapState.mapW + ix] : 0;
                document.getElementById('mapInfo').textContent =
                    `еМЇеЭЧ (${cx}, ${cz}) ¬Ј жЦєеЭЧ (${cx*16}~${cx*16+15}, ${cz*16}~${cz*16+15})${isSlime ? ' ¬Ј рЯЯҐ еП≤иО±еІЖ' : ''}`;
            }
        });

        window.addEventListener('mouseup', () => { mapState.dragging = false; });

        // жїЪиљЃзЉ©жФЊ
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const oldSize = mapState.cellSize;
            if (e.deltaY < 0) {
                mapState.cellSize = Math.min(32, mapState.cellSize + 1);
            } else {
                mapState.cellSize = Math.max(1, mapState.cellSize - 1);
            }
            const scale = mapState.cellSize / oldSize;
            mapState.offsetX = mx - (mx - mapState.offsetX) * scale;
            mapState.offsetY = my - (my - mapState.offsetY) * scale;
            drawMap();
        }, { passive: false });

        window.zoomIn = function() {
            const cx = canvas.width / 2, cy = canvas.height / 2;
            const oldSize = mapState.cellSize;
            mapState.cellSize = Math.min(32, mapState.cellSize + 2);
            const scale = mapState.cellSize / oldSize;
            mapState.offsetX = cx - (cx - mapState.offsetX) * scale;
            mapState.offsetY = cy - (cy - mapState.offsetY) * scale;
            drawMap();
        };

        window.zoomOut = function() {
            const cx = canvas.width / 2, cy = canvas.height / 2;
            const oldSize = mapState.cellSize;
            mapState.cellSize = Math.max(1, mapState.cellSize - 2);
            const scale = mapState.cellSize / oldSize;
            mapState.offsetX = cx - (cx - mapState.offsetX) * scale;
            mapState.offsetY = cy - (cy - mapState.offsetY) * scale;
            drawMap();
        };

        window.resetView = function() {
            if (!mapState.bitmap) return;
            const maxCellW = canvas.width / mapState.mapW;
            const maxCellH = canvas.height / mapState.mapH;
            mapState.cellSize = Math.max(2, Math.min(16, Math.floor(Math.min(maxCellW, maxCellH))));
            mapState.offsetX = (canvas.width - mapState.mapW * mapState.cellSize) / 2;
            mapState.offsetY = (canvas.height - mapState.mapH * mapState.cellSize) / 2;
            drawMap();
        };

        // еИЭеІЛеМЦпЉИдЄїзЇњз®ЛеП™еК†иљљ get_slime_bitmap зФ®дЇОеЬ∞еЫЊжЄ≤жЯУпЉЙ
        async function loadWasm() {
            try {
                await init();
                wasmReady = true;
                updateButtonState();
                document.getElementById('statusText').textContent = 'WASM еК†иљљеЃМжИРпЉМиЊУеЕ•еПВжХ∞еРОзВєеЗїжРЬзіҐ';
            } catch (e) {
                document.getElementById('searchBtn').textContent = 'WASM еК†иљље§±иі•';
                document.getElementById('statusText').textContent = 'йФЩиѓѓ: ' + e.message;
                console.error(e);
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        loadWasm();
    </script>
</body>
</html>
